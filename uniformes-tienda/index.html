<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Identidad básica ─────────────────────────────────────── -->
    <title>Dotaciones Tessuti — Uniformes Escolares Medellín</title>
    <meta name="description" content="Compra los uniformes de tu colegio de forma fácil y segura. Dotaciones Tessuti fabrica uniformes escolares de alta calidad en Medellín, Antioquia." />
    <meta name="theme-color" content="#181715" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph (WhatsApp, Facebook, LinkedIn) ───────────── -->
    <!-- IMPORTANTE: reemplaza la URL por la de tu dominio real     -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Dotaciones Tessuti" />
    <meta property="og:title"       content="Dotaciones Tessuti — Uniformes Escolares Medellín" />
    <meta property="og:description" content="Compra los uniformes de tu colegio de forma fácil y segura. Fabricamos uniformes escolares de alta calidad en Medellín." />
    <meta property="og:url"         content="https://dotaciones-tessuti.vercel.app" />
    <meta property="og:image"       content="https://dotaciones-tessuti.vercel.app/og-image.png" />
    <meta property="og:image:width"  content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt"    content="Logo Dotaciones Tessuti" />
    <meta property="og:locale"       content="es_CO" />

    <!-- ── Twitter / X Card ────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Dotaciones Tessuti — Uniformes Escolares Medellín" />
    <meta name="twitter:description" content="Compra los uniformes de tu colegio de forma fácil y segura. Fabricamos uniformes escolares de alta calidad en Medellín." />
    <meta name="twitter:image"       content="https://dotaciones-tessuti.vercel.app/og-image.png" />

    <!-- ── Favicon ─────────────────────────────────────────────── -->
    <link rel="icon"             type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon"                     href="/og-image.png" />

    <!-- ── Priority Hints: preconnect a dominios externos críticos -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com" />

    <!-- ── Google Analytics 4 ───────────────────────────────────── -->
    <!-- El ID se configura en .env como VITE_GA_ID=G-XXXXXXXXXX   -->
    <!-- El script se inyecta desde main.jsx al arrancar la app     -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
